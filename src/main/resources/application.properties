spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=PrimeShop;integratedSecurity=false;encrypt=false;trustServerCertificate=true;
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.datasource.username=pht
spring.datasource.password=1412


# Hibernate không động chạm vào schema
spring.jpa.hibernate.ddl-auto=update

# Flyway là nguồn quản lý schema chính
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=false
spring.flyway.fail-on-missing-locations=false
spring.flyway.locations=classpath:db/migration

# Đảm bảo Hibernate chỉ load sau Flyway
spring.jpa.defer-datasource-initialization=false

# Nếu có file data.sql thì vẫn cho chạy sau Flyway
spring.sql.init.mode=always

server.port=8080
server.ssl.enable=true
server.ssl.key-store-type=PKCS12
